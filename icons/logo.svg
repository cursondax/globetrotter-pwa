<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!-- Hintergrund-Gradient: tiefschwarz zu dunkelblau -->
    <radialGradient id="bg-grad" cx="50%" cy="42%" r="58%">
      <stop offset="0%"   stop-color="#141428"/>
      <stop offset="100%" stop-color="#08080e"/>
    </radialGradient>

    <!-- Gold-Gradient fuer Hauptelemente -->
    <linearGradient id="gold-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8c97a"/>
      <stop offset="45%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#9a7830"/>
    </linearGradient>

    <!-- Gold-Gradient hell fuer Highlights -->
    <linearGradient id="gold-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f0d898"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>

    <!-- Subtiler Glanz-Gradient fuer den Kreis-Rand -->
    <linearGradient id="rim-grad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#e8c97a" stop-opacity="0.9"/>
      <stop offset="40%"  stop-color="#c9a84c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9a7830" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Inneres Leuchten (glow) -->
    <radialGradient id="inner-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>

    <!-- Filter: weiches Glow fuer Goldlinien -->
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filter: starkes Glow fuer den Hauptring -->
    <filter id="glow-ring" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip-Path: Kreis fuer Meridian-Linien -->
    <clipPath id="globe-clip">
      <circle cx="256" cy="220" r="148"/>
    </clipPath>

  </defs>

  <!-- ============================================================
       HINTERGRUND
  ============================================================ -->
  <!-- Aeusseres quadratisches Feld (fuer maskable icons) -->
  <rect width="512" height="512" fill="url(#bg-grad)"/>

  <!-- Inneres Leuchten -->
  <circle cx="256" cy="220" r="200" fill="url(#inner-glow)"/>


  <!-- ============================================================
       GLOBUS-KONSTRUKTION
       Zentrum: 256, 220
       Radius Hauptring: 148
  ============================================================ -->

  <!-- Aeusserster subtiler Halo-Ring -->
  <circle cx="256" cy="220" r="162"
    fill="none"
    stroke="#c9a84c"
    stroke-width="1"
    stroke-opacity="0.12"/>

  <!-- Hauptring des Globus -->
  <circle cx="256" cy="220" r="148"
    fill="none"
    stroke="url(#rim-grad)"
    stroke-width="2.5"
    filter="url(#glow-ring)"/>

  <!-- Mittlerer Innenring (Tiefe) -->
  <circle cx="256" cy="220" r="148"
    fill="none"
    stroke="#c9a84c"
    stroke-width="1.2"
    stroke-opacity="0.25"/>


  <!-- ============================================================
       MERIDIAN-LINIEN (Laengengrade als Ellipsen)
       Geben dem Globus seine charakteristische Form
  ============================================================ -->

  <!-- Meridian 1: schmal (fast seitlich) -->
  <ellipse cx="256" cy="220" rx="42" ry="148"
    fill="none"
    stroke="url(#gold-main)"
    stroke-width="1.4"
    stroke-opacity="0.5"
    clip-path="url(#globe-clip)"
    filter="url(#glow-gold)"/>

  <!-- Meridian 2: mittel -->
  <ellipse cx="256" cy="220" rx="90" ry="148"
    fill="none"
    stroke="url(#gold-main)"
    stroke-width="1.6"
    stroke-opacity="0.65"
    clip-path="url(#globe-clip)"
    filter="url(#glow-gold)"/>

  <!-- Meridian 3: breiter -->
  <ellipse cx="256" cy="220" rx="130" ry="148"
    fill="none"
    stroke="url(#gold-main)"
    stroke-width="1.4"
    stroke-opacity="0.5"
    clip-path="url(#globe-clip)"
    filter="url(#glow-gold)"/>


  <!-- ============================================================
       BREITENGRAD-LINIEN (Latitueden)
       3 horizontale Ellipsen
  ============================================================ -->

  <!-- Aequator -->
  <ellipse cx="256" cy="220" rx="148" ry="38"
    fill="none"
    stroke="url(#gold-light)"
    stroke-width="1.8"
    stroke-opacity="0.7"
    clip-path="url(#globe-clip)"
    filter="url(#glow-gold)"/>

  <!-- Breitengrad Norden -->
  <ellipse cx="256" cy="162" rx="122" ry="28"
    fill="none"
    stroke="#c9a84c"
    stroke-width="1.2"
    stroke-opacity="0.4"
    clip-path="url(#globe-clip)"/>

  <!-- Breitengrad Sueden -->
  <ellipse cx="256" cy="278" rx="122" ry="28"
    fill="none"
    stroke="#c9a84c"
    stroke-width="1.2"
    stroke-opacity="0.4"
    clip-path="url(#globe-clip)"/>


  <!-- ============================================================
       POLPUNKT: Kleiner goldener Kreis oben
  ============================================================ -->
  <circle cx="256" cy="72" r="5"
    fill="url(#gold-main)"
    filter="url(#glow-gold)"/>

  <!-- Polachse: vertikale Linie durch den Globus -->
  <line x1="256" y1="72" x2="256" y2="368"
    stroke="url(#gold-main)"
    stroke-width="1.5"
    stroke-opacity="0.6"
    clip-path="url(#globe-clip)"/>


  <!-- ============================================================
       DEKORATIVER BOGEN: Oben und Unten (Sextant-Anmutung)
  ============================================================ -->

  <!-- Oberer Bogen-Akzent (Navigation / Sextant) -->
  <path d="M 148 130 A 148 148 0 0 1 364 130"
    fill="none"
    stroke="url(#gold-light)"
    stroke-width="1"
    stroke-opacity="0.35"
    stroke-dasharray="4 6"/>


  <!-- ============================================================
       NORDPUNKT-MARKER: Kleines Diamant-Symbol oben
  ============================================================ -->
  <polygon points="256,60  261,72  256,84  251,72"
    fill="url(#gold-main)"
    filter="url(#glow-gold)"/>


  <!-- ============================================================
       W+B MONOGRAMM: Dezent ins Globus-Zentrum graviert
       Globus-Zentrum: 256, 220 | sitzt auf dem Aequator
  ============================================================ -->

  <!-- Sanfte Hinterleuchtung damit Monogramm nicht im Liniengewirr untergeht -->
  <circle cx="256" cy="220" r="52"
    fill="#08080e"
    fill-opacity="0.5"/>

  <!-- Siegel-Ring: gestrichelt, sehr dezent -->
  <circle cx="256" cy="220" r="52"
    fill="none"
    stroke="#c9a84c"
    stroke-width="0.8"
    stroke-opacity="0.22"
    stroke-dasharray="3 5"/>

  <!-- "W" links, kursiv, Cormorant -->
  <text x="234" y="230"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="42"
    font-weight="300"
    font-style="italic"
    fill="#c9a84c"
    fill-opacity="0.68"
    filter="url(#glow-gold)">W</text>

  <!-- Kaufmanns-Und Mitte: hochgestellt, sehr klein -->
  <text x="256" y="218"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="16"
    font-weight="300"
    fill="#c9a84c"
    fill-opacity="0.40">&amp;</text>

  <!-- "B" rechts, kursiv, Cormorant -->
  <text x="278" y="230"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="42"
    font-weight="300"
    font-style="italic"
    fill="#c9a84c"
    fill-opacity="0.68"
    filter="url(#glow-gold)">B</text>


  <!-- ============================================================
       WORDMARK: "GlobeTrotter SQL"
       Unter dem Globus, zweizeilig
  ============================================================ -->

  <!-- Hauptname: "GlobeTrotter" -->
  <text
    x="256"
    y="418"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="52"
    font-weight="300"
    letter-spacing="4"
    fill="url(#gold-main)"
    filter="url(#glow-gold)">GlobeTrotter</text>

  <!-- Subtitel: "SQL" mit Leerzeichen-Abstand -->
  <text
    x="256"
    y="458"
    text-anchor="middle"
    font-family="'DM Sans', 'system-ui', sans-serif"
    font-size="18"
    font-weight="300"
    letter-spacing="12"
    fill="#c9a84c"
    fill-opacity="0.6">SQL</text>

  <!-- Dezente Trennlinie zwischen Name und Sub -->
  <line x1="206" y1="430" x2="306" y2="430"
    stroke="#c9a84c"
    stroke-width="0.6"
    stroke-opacity="0.3"/>


  <!-- ============================================================
       ICON-ONLY VERSION (fuer kleine Groessen sichtbar)
       Ein "G" mit Meridian-Linie - wird bei kleinen Groessen klarer
  ============================================================ -->
  <!-- (Das Hauptdesign ist bei 512px und 192px gut lesbar,
       fuer 48px/72px spaeter eine vereinfachte Variante) -->

</svg>
