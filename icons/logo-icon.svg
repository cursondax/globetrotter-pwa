<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#141428"/>
      <stop offset="100%" stop-color="#08080e"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8c97a"/>
      <stop offset="50%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#9a7830"/>
    </linearGradient>
    <linearGradient id="goldh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f0d898"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="c"><circle cx="96" cy="88" r="58"/></clipPath>
  </defs>

  <!-- Hintergrund mit Padding fuer maskable -->
  <rect width="192" height="192" rx="0" fill="url(#bg)"/>
  <!-- Innerer Kreis-Hintergrund -->
  <circle cx="96" cy="88" r="72" fill="#0a0a14" fill-opacity="0.6"/>

  <!-- Halo -->
  <circle cx="96" cy="88" r="64" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Hauptring -->
  <circle cx="96" cy="88" r="58" fill="none" stroke="url(#gold)" stroke-width="1.8" filter="url(#glow)"/>

  <!-- Meridiane -->
  <ellipse cx="96" cy="88" rx="17" ry="58" fill="none" stroke="url(#gold)" stroke-width="1.1" stroke-opacity="0.5" clip-path="url(#c)" filter="url(#glow)"/>
  <ellipse cx="96" cy="88" rx="38" ry="58" fill="none" stroke="url(#gold)" stroke-width="1.3" stroke-opacity="0.65" clip-path="url(#c)" filter="url(#glow)"/>

  <!-- Aequator -->
  <ellipse cx="96" cy="88" rx="58" ry="15" fill="none" stroke="url(#goldh)" stroke-width="1.5" stroke-opacity="0.75" clip-path="url(#c)" filter="url(#glow)"/>

  <!-- Polachse -->
  <line x1="96" y1="30" x2="96" y2="146" stroke="url(#gold)" stroke-width="1.2" stroke-opacity="0.55" clip-path="url(#c)"/>

  <!-- Polpunkt / Nordmarker -->
  <polygon points="96,22  99.5,30  96,38  92.5,30" fill="url(#gold)" filter="url(#glow)"/>

  <!-- ============================================================
       W&B MONOGRAMM: Dezent ins Globus-Zentrum graviert
       Sitzt genau auf dem Aequator, zwischen den Meridianen
  ============================================================ -->

  <!-- Hinterleuchtung: ganz sanfter Kreis damit Monogramm lesbar -->
  <circle cx="96" cy="88" r="22"
    fill="#08080e"
    fill-opacity="0.55"/>

  <!-- Dezente Kreislinie um das Monogramm (Siegel-Anmutung) -->
  <circle cx="96" cy="88" r="22"
    fill="none"
    stroke="#c9a84c"
    stroke-width="0.6"
    stroke-opacity="0.28"
    stroke-dasharray="2.5 3.5"/>

  <!-- "W" links -->
  <text x="88" y="93"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="16"
    font-weight="300"
    font-style="italic"
    fill="#c9a84c"
    fill-opacity="0.72"
    letter-spacing="0">W</text>

  <!-- "&" Mitte: kleiner, hoeher gestellt -->
  <text x="96" y="89"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="7"
    font-weight="300"
    fill="#c9a84c"
    fill-opacity="0.45">&#38;</text>

  <!-- "B" rechts -->
  <text x="104" y="93"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="16"
    font-weight="300"
    font-style="italic"
    fill="#c9a84c"
    fill-opacity="0.72"
    letter-spacing="0">B</text>

  <!-- Wordmark "GT" als kompakter Schriftzug unten -->
  <text x="96" y="163"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="20"
    font-weight="300"
    letter-spacing="5"
    fill="url(#gold)"
    fill-opacity="0.9">GT</text>

  <line x1="72" y1="167" x2="120" y2="167" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>

  <text x="96" y="178"
    text-anchor="middle"
    font-family="'DM Sans', system-ui, sans-serif"
    font-size="7"
    font-weight="300"
    letter-spacing="4"
    fill="#c9a84c"
    fill-opacity="0.5">SQL</text>
</svg>
